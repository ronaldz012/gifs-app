<div class="relative">

  <button
    (click)="isOpen = !isOpen"
    class="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-gray-100
           transition-colors cursor-pointer border-none bg-transparent">
    <div class="w-7 h-7 rounded-full bg-gray-100 border border-gray-200
                flex items-center justify-center text-[11px] font-medium text-gray-600">
      {{ initials }}
    </div>
    <span class="text-sm font-medium text-gray-900">{{ currentUser.username }}</span>
    <svg
      class="text-gray-400 transition-transform duration-200"
      [class.rotate-180]="isOpen"
      width="12" height="12" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  @if (isOpen) {
    <div class="absolute top-[calc(100%+6px)] right-0 min-w-[180px] bg-white
                border border-gray-200 rounded-[10px] p-1 z-50">

      <div class="px-2.5 py-2 border-b border-gray-100 mb-1">
        <p class="text-xs font-medium text-gray-900 truncate">{{ currentUser.username }}</p>
        <p class="text-[11px] text-gray-400 truncate">{{ currentUser.email }}</p>
      </div>

      <button
        (click)="logout()"
        class="flex items-center gap-2.5 w-full px-2.5 py-2 rounded-[7px]
               text-sm text-red-600 hover:bg-red-50 transition-colors text-left">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Cerrar sesión
      </button>

    </div>
  }

</div>

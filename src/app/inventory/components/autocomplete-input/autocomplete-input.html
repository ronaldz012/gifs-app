<select [ngModel]="value()"
        (ngModelChange)="value.set($event)"
        class="w-full px-2 py-2 border rounded-lg bg-white"
        [class.border-red-500]="forceTouched() && value() === 0">
  <option value="0">-- {{ placeHolder() }} --</option>
  @for (item of options(); track item.id) {
    <option [value]="item.id">{{ item.name }}</option>
  }
</select>

@if (forceTouched() && value() === 0) {
  <p class="text-red-500 text-sm">Seleccioná una opción</p>
}

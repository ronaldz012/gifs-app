@if (view() === 'list') {
  <div class="p-6">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-900">Recepciones</h1>
      <button
        type="button"
        (click)="showForm()"
        class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Nueva recepción
      </button>
    </div>
    <!-- TODO: lista de recepciones -->
    <p class="text-gray-400 text-sm">Lista pendiente...</p>
  </div>
}

@if (view() === 'form') {
  <app-reception-form
    (saved)="onSaved()"
    (cancelled)="onCancelled()"
  />
}

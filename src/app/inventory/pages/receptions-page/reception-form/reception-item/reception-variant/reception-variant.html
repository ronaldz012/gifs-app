<div
  [formGroup]="form()"
  class="grid gap-0 border-b border-gray-100 last:border-b-0 hover:bg-gray-50 group"
  [style]="forceNew()
    ? 'grid-template-columns: 1fr 80px 96px 88px 88px 100px 96px 32px'
    : 'grid-template-columns: 80px 1fr 80px 96px 88px 88px 100px 96px 32px'"
>

  <!-- TOGGLE -->
  @if (!forceNew()) {
    <div class="flex items-center px-2 py-1.5">
      <div class="flex border border-gray-300 rounded overflow-hidden text-[10px]">
        <button type="button" (click)="switchToExisting()">Ex</button>
        <button type="button" (click)="switchToNew()">New</button>
      </div>
    </div>
  }

  <!-- ================= EXISTING ================= -->
  @if (!isNewVariant()) {

    <div class="px-1 py-1 relative">
      <input
        type="text"
        [value]="variantSearch()"
        (input)="onSearchInput($any($event.target).value)"
        placeholder="Buscar variante..."
        class="w-full px-2 py-1.5 border rounded text-sm"
      />
    </div>

    <div class="px-1 py-1 flex items-center">
      <span class="w-full px-2 text-sm text-gray-400 truncate">
        {{ selectedVariantSize() || '—' }}
      </span>
    </div>

    <div class="px-1 py-1 flex items-center">
      <span class="w-full px-2 text-sm text-gray-400 truncate">
        {{ selectedVariantColor() || '—' }}
      </span>
    </div>

    <div class="px-1 py-1 flex items-center justify-end">
      <span class="px-2 text-sm text-gray-400">
        {{ selectedVariantPrice() != null ? selectedVariantPrice() : '—' }}
      </span>
    </div>

  }

  <!-- ================= NEW ================= -->
  @if (isNewVariant()) {

    <ng-container formGroupName="newVariant">

      <div class="px-1 py-1">
        <input
          type="text"
          formControlName="description"
          placeholder="Descripción..."
          class="w-full px-2 py-1.5 border rounded text-sm"
        />
      </div>

      <div class="px-1 py-1">
        <input
          type="text"
          formControlName="size"
          placeholder="S/M/L"
          class="w-full px-2 py-1.5 border rounded text-sm"
        />
      </div>

      <div class="px-1 py-1">
        <input
          type="text"
          formControlName="color"
          placeholder="Color"
          class="w-full px-2 py-1.5 border rounded text-sm"
        />
      </div>

      <div class="px-1 py-1">
        <input
          type="number"
          formControlName="price"
          placeholder="0"
          class="w-full px-2 py-1.5 border rounded text-sm text-right"
        />
      </div>

    </ng-container>

  }

  <!-- ================= COMMON ================= -->

  <div class="px-1 py-1">
    <input
      type="number"
      formControlName="quantityReceived"
      placeholder="0"
      class="w-full px-2 py-1.5 border rounded text-sm text-right"
    />
  </div>

  <div class="px-1 py-1">
    <input
      type="number"
      formControlName="unitCost"
      placeholder="0"
      class="w-full px-2 py-1.5 border rounded text-sm text-right"
    />
  </div>

  <div class="px-2 py-1.5 flex items-center justify-end">
    <span class="text-sm">
      {{ subtotal() > 0 ? 'Bs ' + (subtotal() | number:'1.0-0') : '—' }}
    </span>
  </div>

  <div class="flex items-center justify-center">
    <button type="button" (click)="onRemove()">✕</button>
  </div>

</div>
